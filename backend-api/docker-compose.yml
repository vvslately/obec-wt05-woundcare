services:
  mysql:
    image: mysql:8.4
    container_name: obec-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: obec_thief_detector
    volumes:
      - obec_mysql_data:/var/lib/mysql

volumes:
  obec_mysql_data:
